<main class="admin-main">
    <article class="admin-content-section flow">
        <header class="admin-content-section__header">
            <h1>{{ error.heading }}</h1>
        </header>

        <div class="callout{{#ifEqual error.classification "error"}} callout--error{{else}} callout--warning{{/ifEqual}}">
            <span class="callout__icon" aria-hidden="true">{{#ifEqual error.classification "error"}}[x]{{else}}[!]{{/ifEqual}}</span>
            <div class="callout__body">
                <p class="type-label">{{ error.statusCode }}</p>
                <p class="type-body-sm">{{ error.message }}</p>
            </div>
        </div>

        <p>
            Go to the <a href="/admin">Admin Panel start page</a>.
        </p>
    </article>
</main>
